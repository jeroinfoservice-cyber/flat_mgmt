{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;

            background: url("{% static 'images/bg.jpg' %}") no-repeat center center/cover;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            animation: zoomBg 18s infinite alternate;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(
                rgba(5, 20, 45, 0.85),
                rgba(10, 31, 68, 0.85)
            );
        }

        @keyframes zoomBg {
            0% { background-size: 100%; }
            100% { background-size: 115%; }
        }

        /* GLASS CARD */
        .login-box {
            position: relative;
            z-index: 2;

            width: 380px;
            padding: 35px;

            border-radius: 18px;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);

            border: 1px solid rgba(255,255,255,0.2);

            box-shadow: 0 10px 35px rgba(0,0,0,0.35);

            text-align: center;
        }

        /* TITLE */
        .title {
            color: #F4C542;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #ffffff;
            font-size: 14px;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        /* ERROR */
        .errornote {
            background: rgba(255, 0, 0, 0.15);
            color: #ff4d4d;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 13px;
        }

        /* INPUT */
        input {
            width: 100%;
            padding: 13px;
            margin: 10px 0;

            border-radius: 10px;
            border: none;

            background: rgba(255,255,255,0.15);
            color: white;

            outline: none;
            font-size: 14px;
        }

        input::placeholder {
            color: #ddd;
        }

        input:focus {
            background: rgba(255,255,255,0.25);
            box-shadow: 0 0 0 2px rgba(244,197,66,0.4);
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 13px;
            margin-top: 15px;

            border: none;
            border-radius: 10px;

            background: linear-gradient(135deg, #F4C542, #d8a90f);
            color: #0A1F44;

            font-size: 15px;
            font-weight: bold;

            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(244,197,66,0.5);
        }

        /* MOBILE */
        @media (max-width: 500px) {
            .login-box {
                width: 90%;
                padding: 25px;
            }

            .title {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>

<div class="login-box">

    <div class="title">
        PERBADANAN PENGURUSAN BLOK B1
    </div>

    <div class="subtitle">
        Management Admin Login
    </div>

    {% if form.errors %}
        <div class="errornote">
            Invalid username or password
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

</div>

</body>
</html>
