<!DOCTYPE html>
<html>
<head>
<title>PERBADANAN PENGURUSAN BLOK B1</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BODY */
body{
font-family:Arial, sans-serif;
background:#1f4e79; /* BLUE BACKGROUND */
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CARD BOX */
.box{
width:90%;
max-width:400px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
text-align:center;
}

/* TITLE */
h2{
color:#1f4e79;
font-size:24px;
margin-bottom:20px;
}

/* TEXT */
p{
font-size:18px;
margin:5px 0;
}

/* INPUT */
input{
width:100%;
padding:15px;
margin:10px 0 15px 0;
border:1px solid #ccc;
border-radius:10px;
font-size:18px;
}

/* BUTTON */
button{
width:100%;
padding:16px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:20px;
font-weight:bold;
color:white;
}

/* COLORS */
.btn-blue{background:#2c5d8f;}
.btn-green{background:#2e8b57;}
.btn-yellow{background:#c79200;}
.btn-red{background:#c0392b;}

/* ERROR */
.error{
color:red;
margin-top:10px;
}

</style>
</head>

<body>

<div class="box">

<!-- 🔐 LOGIN PAGE -->
<h2>PERBADANAN PENGURUSAN BLOK B1</h2>

<form method="post">
{% csrf_token %}

<input type="text" name="house" placeholder="🏠 House Number">

<input type="password" name="password" placeholder="🔒 Password">

<button type="submit" class="btn-blue">Login</button>

</form>

<p class="error">{{ error }}</p>

</div>

</body>
</html>
