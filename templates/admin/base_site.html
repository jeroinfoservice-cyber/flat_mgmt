{% extends "admin/base.html" %}
{% load static %}

{% block extrastyle %}
{{ block.super }}

<style>
    body,
    #container {
        background: url("{% static 'images/bg.jpg' %}") no-repeat center center fixed !important;
        background-size: cover !important;
    }

    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(5, 20, 45, 0.35);
        z-index: 0;
        pointer-events: none;
    }

    #container,
    #header,
    .breadcrumbs,
    #content,
    #content-main,
    #nav-sidebar,
    .module,
    .dashboard,
    .results,
    .change-list,
    .change-form,
    .app-list,
    .main {
        position: relative;
        z-index: 1;
    }

    #header {
        background: rgba(0, 25, 55, 0.92) !important;
    }

    .breadcrumbs {
        background: rgba(45, 88, 112, 0.92) !important;
    }

    /* Sidebar force show */
    #nav-sidebar {
        display: block !important;
        visibility: visible !important;
        width: 275px !important;
        background: rgba(0, 25, 55, 0.88) !important;
    }

    /* Admin content layout */
    .main {
        display: flex !important;
    }

    #content {
        flex: 1 !important;
        margin-left: 0 !important;
        padding: 20px !important;
    }

    /* Dashboard box */
    .dashboard-wrapper {
        max-width: 1150px;
        margin: 25px auto;
        background: rgba(255, 255, 255, 0.90);
        border-radius: 24px;
        padding: 30px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    .dashboard-title {
        text-align: center;
        margin-bottom: 8px;
        font-size: 24px;
        font-weight: 800;
        color: #11285c;
    }

    .dashboard-subtitle {
        text-align: center;
        margin-bottom: 28px;
        color: #5a6c87;
        font-size: 16px;
    }

    .month-form {
        text-align: center;
        margin-bottom: 30px;
        background: #eef2f8;
        border-radius: 18px;
        padding: 16px;
    }

    .month-form label {
        margin-right: 10px;
        color: #11285c;
        font-size: 16px;
    }

    .month-form select {
        padding: 10px 14px;
        min-width: 240px;
        border-radius: 10px;
        border: 1px solid #cfd8e3;
        font-size: 15px;
    }

    .summary-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }

    .card {
        background: rgba(255, 255, 255, 0.96);
        border-radius: 20px;
        padding: 24px;
        text-align: center;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
    }

    .card h3 {
        margin-bottom: 14px;
        color: #4c5d7a;
        font-size: 16px;
    }

    .card p {
        margin: 0;
        font-size: 24px;
        font-weight: bold;
    }

    .dashboard-table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 14px;
        overflow: hidden;
    }

    .dashboard-table th,
    .dashboard-table td {
        padding: 14px;
        text-align: center;
        border-bottom: 1px solid #ececec;
    }

    .dashboard-table th {
        background: #0b1f5e;
        color: white;
    }

    .green {
        color: #0a9b4b;
    }

    .red {
        color: #e3342f;
    }

    .gold {
        color: #c28b00;
    }

    .bold {
        font-weight: bold;
    }
</style>
{% endblock %}
