<!DOCTYPE html>
<html>
<head>
    <title>Owner Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#1f4e79;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .card{
            width:100%;
            max-width:580px;
            background:#ffffff;
            border-radius:20px;
            box-shadow:0 8px 24px rgba(0,0,0,0.18);
            padding:34px 24px;
            text-align:center;
        }

        h2{
            margin:0 0 14px 0;
            color:#1f4e79;
            font-size:38px;
            font-weight:800;
            line-height:1.2;
        }

        p{
            margin:0 0 28px 0;
            font-size:20px;
            color:#222;
        }

        a{
            display:block;
            width:100%;
            text-decoration:none;
            color:white;
            font-size:24px;
            font-weight:bold;
            padding:20px;
            border-radius:14px;
            margin-top:16px;
        }

        .blue{
            background:#24598b;
        }

        .green{
            background:#2f9658;
        }

        .gold{
            background:#c99710;
        }

        .red{
            background:#cf2626;
        }

        @media (max-width:480px){
            .card{
                max-width:100%;
                padding:30px 20px;
            }

            h2{
                font-size:28px;
            }

            p{
                font-size:18px;
            }

            a{
                font-size:20px;
                padding:17px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Welcome {{ house.owner_name }}</h2>
        <p><strong>House Number:</strong> {{ house.house_number }}</p>

        <a class="blue" href="{% url 'owner_payments' %}">View Payment History</a>
        <a class="green" href="{% url 'owner_announcements' %}">View Announcements</a>
        <a class="gold" href="{% url 'owner_message' %}">Send Message</a>
        <a class="red" href="{% url 'owner_logout' %}">Logout</a>
    </div>

</body>
</html>
