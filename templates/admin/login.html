{% load static %}
<!DOCTYPE html>
<html>

<head>
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
}

html,body{
margin:0;
height:100%;
font-family:Segoe UI,Arial,sans-serif;
}

body{
background:url("{% static 'images/bg.jpg' %}") no-repeat center center fixed;
background-size:cover;

display:flex;
justify-content:center;
align-items:center;
}

/* login card */

.login-box{

width:360px;
padding:35px;

border-radius:16px;

background:rgba(10,25,55,0.92);

box-shadow:0 15px 40px rgba(0,0,0,0.45);

text-align:center;
}

/* title */

.title{
color:#F4C542;
font-size:26px;
font-weight:bold;
margin-bottom:8px;
}

.subtitle{
color:#ffffff;
font-size:14px;
margin-bottom:20px;
}

/* error */

.errornote{
background:#ff4d4d22;
color:#ff4d4d;
padding:10px;
border-radius:8px;
margin-bottom:10px;
font-size:13px;
}

/* input */

input{

width:100%;
padding:12px;
margin:10px 0;

border-radius:8px;
border:none;

background:#ffffff;
font-size:14px;

outline:none;

}

/* button */

button{

width:100%;
padding:12px;
margin-top:15px;

border:none;
border-radius:8px;

background:#F4C542;

font-weight:bold;
font-size:15px;

cursor:pointer;

transition:0.25s;

}

button:hover{

background:#d8a90f;
transform:translateY(-2px);

}

@media(max-width:500px){

.login-box{
width:90%;
}

.title{
font-size:22px;
}

}

</style>

</head>

<body>

<div class="login-box">

<div class="title">
PERBADANAN PENGURUSAN BLOK B1
</div>

<div class="subtitle">
Management Admin Login
</div>

{% if form.errors %}
<div class="errornote">
Invalid username or password
</div>
{% endif %}

<form method="post">
{% csrf_token %}

<input type="hidden" name="next" value="{{ next }}">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
