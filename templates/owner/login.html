<!DOCTYPE html>
<html>
<head>
    <title>PERBADANAN PENGURUSAN B1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#1f4e79;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .card{
            width:100%;
            max-width:500px;
            background:#ffffff;
            border-radius:20px;
            box-shadow:0 8px 24px rgba(0,0,0,0.18);
            padding:34px 24px;
        }

        h2{
            margin:0 0 28px 0;
            text-align:center;
            color:#1f4e79;
            font-size:34px;
            font-weight:800;
            line-height:1.2;
        }

        label{
            display:block;
            color:#1f4e79;
            font-size:18px;
            font-weight:bold;
            margin-bottom:10px;
        }

        input{
            width:100%;
            padding:18px 16px;
            font-size:18px;
            border:2px solid #d9d9d9;
            border-radius:14px;
            margin-bottom:22px;
            outline:none;
        }

        button{
            width:100%;
            border:none;
            border-radius:14px;
            background:#24598b;
            color:white;
            font-size:22px;
            font-weight:bold;
            padding:18px;
            cursor:pointer;
        }

        .error{
            text-align:center;
            color:red;
            font-size:16px;
            margin-top:14px;
        }

        @media (max-width:480px){
            .card{
                max-width:100%;
                padding:30px 20px;
            }

            h2{
                font-size:28px;
            }

            label{
                font-size:17px;
            }

            input{
                font-size:17px;
                padding:16px 14px;
            }

            button{
                font-size:20px;
                padding:17px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>PERBADANAN<br>PENGURUSAN B1</h2>

        <form method="post">
            {% csrf_token %}

            <label>House Number</label>
            <input type="text" name="house" placeholder="Enter House Number">

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter Password">

            <button type="submit">Login</button>
        </form>

        <p class="error">{{ error }}</p>
    </div>

</body>
</html>
