<!DOCTYPE html>
<html>
<head>
    <title>Owner Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #071833, #0A1F44, #12315d);
            padding: 24px;
        }

        .wrapper {
            max-width: 650px;
            margin: 30px auto;
        }

        .card {
            background: rgba(255,255,255,0.98);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 18px 35px rgba(0,0,0,0.20);
        }

        .title {
            color: #0A1F44;
            font-size: 30px;
            font-weight: bold;
            margin: 0 0 8px;
            line-height: 1.25;
        }

        .sub {
            color: #5c6880;
            margin: 0 0 24px;
            font-size: 15px;
        }

        .info-box {
            background: linear-gradient(135deg, #f7faff, #eef4ff);
            border: 1px solid #dde7f5;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .info-box p {
            margin: 6px 0;
            font-size: 16px;
            color: #243852;
        }

        .btn {
            display: block;
            text-decoration: none;
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            margin-top: 12px;
            transition: 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .blue  { background: linear-gradient(135deg, #1f4e79, #2e6da5); }
        .green { background: linear-gradient(135deg, #1d8a4c, #29a35d); }
        .gold  { background: linear-gradient(135deg, #c78d00, #f0b41a); color: #10213f; }
        .red   { background: linear-gradient(135deg, #bb2020, #dc3535); }

        @media (max-width: 600px) {
            body {
                padding: 14px;
            }

            .wrapper {
                margin: 10px auto;
            }

            .card {
                padding: 20px;
            }

            .title {
                font-size: 25px;
            }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <h1 class="title">{{ flat.name|default:"PERBADANAN PENGURUSAN BLOK B1" }}</h1>
        <p class="sub">Owner Dashboard</p>

        <div class="info-box">
            <p><strong>Owner Name:</strong> {{ house.owner_name }}</p>
            <p><strong>House Number:</strong> {{ house.house_number }}</p>
        </div>

        <a class="btn blue" href="{% url 'owner_payments' %}">View Payment History</a>
        <a class="btn green" href="{% url 'owner_announcements' %}">View Announcements</a>
        <a class="btn gold" href="{% url 'owner_message' %}">Send Message</a>
        <a class="btn red" href="{% url 'owner_logout' %}">Logout</a>
    </div>
</div>

</body>
</html>
