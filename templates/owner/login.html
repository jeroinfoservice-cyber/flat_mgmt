<!DOCTYPE html>
<html>
<head>
<title>PERBADANAN PENGURUSAN BLOK B1</title>

<meta name="viewport" content="width=device-width, initial-scale=1.5">

<style>

body{
font-family:Arial;
background:#f4f7fb;
margin:0;
padding:20px;
}

.box{
width:200%;
max-width:720px;
margin:50px auto;
background:white;
padding:50px;
border-radius:12px;
box-shadow:0 0 12px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#1f4e79;
}

input{
width:100%;
padding:12px;
margin:8px 0 15px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:200%;
padding:18px;
margin:12px 0;
border:none;
border-radius:12px;
color:white;
font-size:30px;
}

.error{
color:red;
text-align:center;
}

</style>
</head>

<body>

<div class="box">

<h2>PERBADANAN PENGURUSAN BLOK B1</h2>

<form method="post">
{% csrf_token %}

<label>House Number</label>
<input type="text" name="house">

<label>Password</label>
<input type="password" name="password">

<button type="submit">Login</button>

</form>

<p class="error">{{ error }}</p>

</div>

</body>
</html>
