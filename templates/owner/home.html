<!DOCTYPE html>
<html>
<head>
    <title>Owner Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            background: linear-gradient(135deg, #071833, #0A1F44);
            color: white;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background: #001437;
            height: 100vh;
            padding: 20px;
            position: fixed;
        }

        .sidebar h2 {
            color: #f4c542;
            font-size: 18px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 15px 0;
            padding: 10px;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: #0A1F44;
        }

        /* MAIN */
        .main {
            margin-left: 220px;
            padding: 25px;
            width: 100%;
        }

        .card {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .card h3 {
            margin: 0;
        }

        .count {
            font-size: 28px;
            font-weight: bold;
            color: #1f4e79;
        }

        /* POPUP */
        .popup {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }

        .btn {
            display: block;
            padding: 12px;
            margin: 10px 0;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            color: white;
        }

        .blue { background: #1f4e79; }
        .green { background: #1a8f43; }
        .gold { background: #d39d00; color:black; }
        .red { background: #d32027; }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>FLAT SYSTEM</h2>

    <a href="{% url 'owner_home' %}">🏠 Dashboard</a>
    <a href="{% url 'owner_payments' %}">💰 Payments</a>
    <a href="{% url 'owner_announcements' %}">📢 Announcements</a>
    <a href="{% url 'owner_message' %}">✉ Messages</a>
    <a href="{% url 'owner_logout' %}">🚪 Logout</a>
</div>

<div class="main">

    <h2>{{ flat.name }}</h2>

    <div class="card">
        <h3>House Number</h3>
        <div class="count" id="houseCount">0</div>
    </div>

    <div class="card">
        <h3>Total Payments Made</h3>
        <div class="count" id="paymentCount">0</div>
    </div>

    <a class="btn blue" href="{% url 'owner_payments' %}">View Payments</a>
    <a class="btn green" href="{% url 'owner_announcements' %}">Announcements</a>
    <a class="btn gold" href="{% url 'owner_message' %}">Send Message</a>
    <a class="btn red" href="{% url 'owner_logout' %}">Logout</a>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
    🔔 New announcement available!
</div>

<script>
    // Animated counter
    function animate(id, value) {
        let i = 0;
        let interval = setInterval(() => {
            document.getElementById(id).innerText = i;
            i++;
            if (i > value) clearInterval(interval);
        }, 30);
    }

    animate("houseCount", 1);
    animate("paymentCount", {{ payment_count|default:0 }});

    // Popup
    setTimeout(() => {
        document.getElementById("popup").style.display = "block";
    }, 1000);
</script>

</body>
</html>
