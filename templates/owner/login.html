{% load static %}

<!DOCTYPE html>

<html>
<head>
    <title>Owner Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: url("{% static 'images/bg.jpg' %}") no-repeat center center fixed;
        background-size: cover;
        overflow: hidden;
    }

    body::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(5, 20, 45, 0.50);
        z-index: 1;
    }

    .login-box {
        position: relative;
        z-index: 2;
        width: 92%;
        max-width: 420px;
        padding: 34px 28px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.10);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(255,255,255,0.18);
        box-shadow: 0 16px 38px rgba(0,0,0,0.35);
        text-align: center;
    }

    .title {
        color: #f4c542;
        font-size: 27px;
        font-weight: bold;
        line-height: 1.35;
        margin-bottom: 6px;
    }

    .subtitle {
        color: rgba(255,255,255,0.92);
        font-size: 14px;
        margin-bottom: 22px;
    }

    .error {
        background: rgba(255, 73, 73, 0.14);
        color: #ff8a8a;
        border: 1px solid rgba(255, 120, 120, 0.22);
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 14px;
        font-size: 14px;
    }

    label {
        display: block;
        text-align: left;
        color: #ffffff;
        margin: 10px 0 6px;
        font-size: 14px;
        font-weight: 600;
    }

    input {
        width: 100%;
        padding: 13px 14px;
        border: none;
        border-radius: 12px;
        background: rgba(255,255,255,0.14);
        color: white;
        font-size: 15px;
        outline: none;
        margin-bottom: 10px;
    }

    input::placeholder {
        color: rgba(255,255,255,0.65);
    }

    input:focus {
        background: rgba(255,255,255,0.22);
        box-shadow: 0 0 0 2px rgba(244,197,66,0.35);
    }

    button {
        width: 100%;
        padding: 13px;
        margin-top: 12px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #f4c542, #dba400);
        color: #071833;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s ease;
    }

    button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 22px rgba(244,197,66,0.30);
    }
</style>


</head>
<body>

<div class="login-box">
    <div class="title">{{ flat.name|default:"PERBADANAN PENGURUSAN BLOK B1" }}</div>
    <div class="subtitle">House Owner Login</div>


{% if error %}
    <div class="error">{{ error }}</div>
{% endif %}

<form method="post">
    {% csrf_token %}

    <label>House Number</label>
    <input type="text" name="house" placeholder="Example: A1" required>

    <label>Password</label>
    <input type="password" name="password" placeholder="Enter password" required>

    <button type="submit">Login</button>
</form>


</div>

</body>
</html>
