<!DOCTYPE html>
<html>
<head>
<title>Payment History</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f4f7fb;
margin:0;
padding:20px;
}

.card{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 12px rgba(0,0,0,0.08);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#1f4e79;
color:white;
}

.paid{
color:green;
font-weight:bold;
}

a{
display:block;
margin-top:15px;
text-align:center;
background:#1f4e79;
color:white;
padding:10px;
border-radius:8px;
text-decoration:none;
}

</style>
</head>

<body>

<div class="card">

<h2>Payment History - {{ house.house_number }}</h2>

<table>

<tr>
<th>Month</th>
<th>Amount</th>
<th>Status</th>
<th>Date Paid</th>
</tr>

{% for p in payments %}

<tr>

<td>{{ p.month }}</td>
<td>RM {{ p.amount }}</td>

<td class="paid">
{{ p.status }}
</td>

<td>{{ p.date_paid }}</td>

</tr>

{% endfor %}

</table>

<a href="{% url 'owner_home' %}">Back</a>

</div>

</body>
</html>
