<!DOCTYPE html>
<html>
<head>
    <title>PERBADANAN PENGURUSAN BLOK B1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:#1f4e79;
            margin:0;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:16px;
        }

        .card{
            width:100%;
            max-width:420px;
            background:white;
            padding:28px 22px;
            border-radius:18px;
            box-shadow:0 8px 25px rgba(0,0,0,0.18);
        }

        h2{
            text-align:center;
            color:#1f4e79;
            font-size:28px;
            margin:0 0 22px 0;
            line-height:1.3;
        }

        label{
            display:block;
            font-size:18px;
            font-weight:bold;
            color:#1f4e79;
            margin-bottom:8px;
        }

        input{
            width:100%;
            padding:16px;
            margin:0 0 18px 0;
            border:1px solid #ccc;
            border-radius:12px;
            font-size:18px;
        }

        button{
            width:100%;
            padding:17px;
            border:none;
            border-radius:12px;
            background:#1f4e79;
            color:white;
            font-size:22px;
            font-weight:bold;
            cursor:pointer;
        }

        .error{
            color:red;
            text-align:center;
            margin-top:14px;
            font-size:16px;
        }

        @media (max-width: 480px){
            h2{
                font-size:24px;
            }

            label{
                font-size:17px;
            }

            input{
                font-size:18px;
                padding:15px;
            }

            button{
                font-size:20px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>PERBADANAN PENGURUSAN BLOK B1</h2>

        <form method="post">
            {% csrf_token %}

            <label>House Number</label>
            <input type="text" name="house" placeholder="Enter House Number">

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter Password">

            <button type="submit">Login</button>
        </form>

        <p class="error">{{ error }}</p>
    </div>

</body>
</html>
