<!DOCTYPE html>
<html>
<head>
    <title>Owner Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            box-sizing:border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1f4e79;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 100%;
            max-width: 430px;
            background: white;
            padding: 28px 22px;
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.18);
            text-align: center;
        }

        h2 {
            color: #1f4e79;
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 32px;
            line-height: 1.2;
        }

        p {
            margin: 0 0 24px 0;
            font-size: 22px;
            color: #222;
        }

        a {
            display: block;
            width: 100%;
            text-decoration: none;
            text-align: center;
            margin-top: 14px;
            padding: 18px 14px;
            border-radius: 12px;
            color: white;
            background: #1f4e79;
            font-size: 22px;
            font-weight: bold;
        }

        .green {
            background: #2e8b57;
        }

        .gold {
            background: #c69214;
        }

        .red {
            background: #c62828;
        }

        @media (max-width: 600px) {
            body {
                padding: 16px;
            }

            .card {
                max-width: 100%;
                padding: 24px 18px;
                border-radius: 16px;
            }

            h2 {
                font-size: 28px;
            }

            p {
                font-size: 20px;
            }

            a {
                font-size: 21px;
                padding: 17px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Welcome {{ house.owner_name }}</h2>
        <p><strong>House Number:</strong> {{ house.house_number }}</p>

        <a href="{% url 'owner_payments' %}">View Payment History</a>
        <a class="green" href="{% url 'owner_announcements' %}">View Announcements</a>
        <a class="gold" href="{% url 'owner_message' %}">Send Message</a>
        <a class="red" href="{% url 'owner_logout' %}">Logout</a>
    </div>
</body>
</html>
