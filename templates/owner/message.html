<!DOCTYPE html>
<html>
<head>
    <title>Send Message</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family:Arial, sans-serif;
            background:#f4f7fb;
            margin:0;
            padding:20px;
        }

        .box{
            max-width:700px;
            margin:0 auto;
            background:white;
            border-radius:16px;
            padding:20px;
            box-shadow:0 0 12px rgba(0,0,0,0.08);
        }

        h2{
            text-align:center;
            color:#1f4e79;
        }

        textarea{
            width:100%;
            height:180px;
            padding:14px;
            font-size:16px;
            border:1px solid #ccc;
            border-radius:12px;
            margin-top:10px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            margin-top:16px;
            padding:14px;
            background:#1f4e79;
            color:white;
            border:none;
            border-radius:12px;
            font-size:18px;
            font-weight:bold;
        }

        .success{
            color:green;
            text-align:center;
            margin-top:12px;
            font-weight:bold;
        }

        a{
            display:inline-block;
            margin-top:20px;
            padding:12px 18px;
            background:#1f4e79;
            color:white;
            text-decoration:none;
            border-radius:10px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Send Message to Management</h2>

        <form method="post">
            {% csrf_token %}
            <textarea name="message_text" placeholder="Type your message here..."></textarea>
            <button type="submit">Send Message</button>
        </form>

        <p class="success">{{ success }}</p>

        <a href="{% url 'owner_home' %}">Back to Home</a>
    </div>
</body>
</html>
