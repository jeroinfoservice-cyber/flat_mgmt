<!DOCTYPE html>
<html>
<head>
    <title>Owner Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 0;
        }
        .box {
            max-width: 420px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 0 12px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            color: #1f4e79;
        }
        label {
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            background: #1f4e79;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .error {
            color: red;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>House Owner Login</h2>

        <form method="post">
            {% csrf_token %}

            <label>House Number</label>
            <input type="text" name="house" placeholder="Example: A1">

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password">

            <button type="submit">Login</button>
        </form>

        <p class="error">{{ error }}</p>
    </div>
</body>
</html>
