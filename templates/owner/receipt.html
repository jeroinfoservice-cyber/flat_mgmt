<!DOCTYPE html>
<html>
<head>
    <title>Receipt</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family:Arial, sans-serif;
            background:#f4f7fb;
            margin:0;
            padding:20px;
        }

        .box{
            max-width:600px;
            margin:0 auto;
            background:white;
            border-radius:16px;
            padding:24px;
            box-shadow:0 0 12px rgba(0,0,0,0.08);
        }

        h2{
            text-align:center;
            color:#1f4e79;
        }

        p{
            font-size:18px;
            margin:14px 0;
        }

        a{
            display:inline-block;
            margin-top:20px;
            padding:12px 18px;
            background:#1f4e79;
            color:white;
            text-decoration:none;
            border-radius:10px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Payment Receipt</h2>

        <p><strong>House Number:</strong> {{ house.house_number }}</p>
        <p><strong>Owner Name:</strong> {{ house.owner_name }}</p>
        <p><strong>Month:</strong> {{ payment.month }}</p>
        <p><strong>Amount:</strong> RM {{ payment.amount }}</p>
        <p><strong>Status:</strong> {{ payment.status }}</p>
        <p><strong>Date Paid:</strong> {{ payment.date_paid|default:"-" }}</p>

        <a href="{% url 'owner_payments' %}">Back to Payments</a>
    </div>
</body>
</html>
